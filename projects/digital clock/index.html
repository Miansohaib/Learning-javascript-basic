<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" type="text/css" href="../styles.css" />
    <title>Your Local Time</title>
    <style>
      body {
        background-color: #212121;
        color: #fff;
      }
      /* Navbar */

nav {
    width: 100%;
    height: 70px;
    background-color: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 25px;
    box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
}

nav a {
    text-decoration: none;
    color: #ffffff;
    font-size: 18px;
    font-weight: 500;
    padding: 10px 20px;
    border-radius: 6px;
    transition: all 0.3s ease;
}

nav a:hover {
    background-color: orange;
    color: #111;
    transform: translateY(-2px);
}

nav a[aria-current="page"] {
    background-color: orange;
    color: #111;
    font-weight: 600;
}
      .center {
        display: flex;
        height: 100vh;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }
      /* #clock {
        font-size: 40px;
        background-color: orange;
        padding: 20px 50px;
        margin-top: 10px;
        border-radius: 10px;
      } */

      #date{
    color: white;
    font-size: 24px;
    margin-bottom: 15px;
    letter-spacing: 1px;
}

#clock{
    width: 420px;
    padding: 20px;
    background: orange;
    color: white;
    font-size: 60px;
    text-align: center;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}
    </style>
  </head>
  <body>
    <nav>
      <a href="/" aria-current="page">Home</a>
      <a target="_blank" href="#"
        >Youtube channel</a
      >
    </nav>
    <div class="center">
      <div id="banner"><span>Your local time</span></div>
       <div id="date"></div>
      <div id="clock"></div>
    </div>
    
    <script src="script.js"></script>
  </body>
</html>
