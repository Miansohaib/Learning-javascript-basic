<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: #212121 ; color: aliceblue;" >
    <ul class="Language" >
        <li>Javascript</li>
    </ul>
</body>
<script>
    // not good apporach it will trivers full tree
    function addlanguage(lange) {
        const add = document.createElement('li')
        add.innerHTML  = `${lange}`;
        document.querySelector('.Language').append(add)

        
    }
    addlanguage('python');
    addlanguage('Typescript');
    addlanguage('Java');
// this is the good apporach to add some text 
    function optimal(lang) {
        const add = document.createElement('Li');
       
        add.appendChild(document.createTextNode(lang))
        document.querySelector('.Language').appendChild(add)
    }

    optimal('Swift')

    // edit
    const secondelement = document.querySelector('li:nth-child(2)');
    // secondelement.innerHTML = 'Mojo'
    const newli = document.createElement('li');
    newli.textContent = 'Mojo';
    secondelement.replaceWith(newli);


    //Edit

    const firstelemnet = document.querySelector('li:first-child');
    firstelemnet.outerHTML = '<li> Typescript </li>'

    //remove 

    const middle = document.querySelector('li:nth-child(3)')
    middle.remove();


</script>
</html>
